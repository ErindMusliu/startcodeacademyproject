<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartCode Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-dark navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Navbar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>
                   
                    
                  
                    
                </ul>
                <form class="d-flex">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                    <button class="btn btn-outline-light border-2" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>



    <div class="container-fluid m-0" style="min-height: 80vh;">

        {% block content %}
        {% endblock %}

    </div>

    <footer class="bg-dark p-3 text-light m-0 mb-0">

        <div class="container">
            <hr>

            <div class="row align-items-center">

                <div class="col-md-8">
                    <div>Copyright © 2022 - 2026 StartCode Academy, All Right Reserved.
                    </div>
                </div>

                <div class="col-md-4">
                    <p class="h2">Subscribe</p>
                    <form action="">
                        <div class="row g-1">
                            <div class="col-md-8">
                                <input type="email" placeholder="Sheno Emailin" class="form-control">
                            </div>
                            <div class="col-md-4">
                            <button class="btn btn-outline-light">Send</button>    
                            </div>
                        </div>
                    </form>
                
                </div>

            </div>
            <hr>
        </div>

    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
