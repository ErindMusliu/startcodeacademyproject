{% extends "backend_layout.html" %} {% block content %}

<div class="container">
  <div class="row pt-5">
    <table class="table table-dark table-striped table-hover">
      <thead>
        <tr>
          <th>ID</th>
          <th>Emri i Kategorise</th>
          <th>Pershkrimi i Kategorise</th>
          <th>Veprimet</th>
        </tr>
      </thead>

      <tbody>
        {% for article in articles %}
        <tr>
          <td>{{article.id}}</td>
          <td>{{article.emri_kategorise}}</td>
          <td>{{article.pershkrimi_kategorise}}</td>
          <td>
            <a
              class="btn btn-warning"
              href="/startcodeacademy-project/categories/edit/{{article.id}}"
              >Edit</a
            >
            <a
              class="btn btn-danger"
              href="/startcodeacademy-project/categories/delete_category/{{article.id}}"
              >Delete</a
            >
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
